<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Element Disabler</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">GitHub Pages ready</p>
        <h1>PDF Element Disabler</h1>
        <p class="lead">
          PDFをブラウザ内で開き、クリックしたテキスト要素やドラッグした範囲を一時的に非表示にします。
        </p>
      </div>
      <div class="header-actions">
        <label class="file-button">
          PDFを選択
          <input id="file-input" type="file" accept="application/pdf,.pdf" />
        </label>
        <button id="sample-button" type="button">サンプルPDFを開く</button>
      </div>
    </header>

    <main class="layout">
      <aside class="toolbar" aria-label="PDF操作">
        <section class="panel">
          <h2>非表示ツール</h2>
          <div class="segmented" role="group" aria-label="非表示モード">
            <button id="text-tool" class="active" type="button" aria-pressed="true">テキストクリック</button>
            <button id="area-tool" type="button" aria-pressed="false">範囲ドラッグ</button>
          </div>
          <p id="tool-help" class="hint">
            テキスト上にカーソルを重ね、薄い枠が出た要素をクリックすると隠せます。
          </p>
        </section>

        <section class="panel">
          <h2>表示</h2>
          <label class="select-label" for="scale-select">拡大率</label>
          <select id="scale-select">
            <option value="0.8">80%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
          <button id="print-button" type="button" disabled>印刷 / PDF保存</button>
        </section>

        <section class="panel">
          <h2>編集</h2>
          <button id="undo-button" type="button" disabled>1つ戻す</button>
          <button id="reset-button" type="button" disabled>すべて表示に戻す</button>
          <p class="counter"><span id="hidden-count">0</span> 個の要素を非表示</p>
        </section>

        <section class="panel note">
          <h2>メモ</h2>
          <p>
            非表示は画面表示と印刷用の白いマスクです。機密情報の完全な削除には、専用の墨消しツールを使ってください。
          </p>
        </section>
      </aside>

      <section class="viewer-wrap" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <h2>PDFを読み込んでください</h2>
          <p>
            ローカルPDFを選択するか、このリポジトリに含まれる <code>main.pdf</code> をサンプルとして開けます。
          </p>
        </div>
        <div id="status" class="status" role="status"></div>
        <div id="viewer" class="viewer"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
